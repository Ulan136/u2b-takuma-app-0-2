<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>TAKUMA — Прайс-лист</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.8.2/jspdf.plugin.autotable.min.js"></script>
<style>
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:'Segoe UI',Arial,sans-serif;background:#f0f2f8;color:#222;min-height:100vh}

  /* HEADER */
  .header{background:linear-gradient(135deg,#1a1a4e 0%,#2d2d8e 100%);color:#fff;padding:0 24px;display:flex;align-items:center;gap:16px;position:sticky;top:0;z-index:100;box-shadow:0 2px 12px #0004;flex-wrap:wrap}
  .logo{display:flex;align-items:center;gap:10px;padding:14px 0}
  .logo-box{background:#fff2;border-radius:8px;padding:6px 12px;font-size:22px;font-weight:900;letter-spacing:-1px;color:#ffd700}
  .logo-sub{font-size:11px;opacity:.7;margin-top:2px}
  .header-mid{flex:1;min-width:220px;padding:10px 0}
  .search-wrap{position:relative}
  .search-wrap input{width:100%;padding:10px 16px 10px 40px;border:none;border-radius:10px;font-size:14px;background:#fff2;color:#fff;outline:none;border:1.5px solid transparent}
  .search-wrap input::placeholder{color:#aac}
  .search-wrap input:focus{border-color:#ffd700;background:#fff3}
  .search-icon{position:absolute;left:12px;top:50%;transform:translateY(-50%);opacity:.6;font-size:16px}
  .header-right{display:flex;align-items:center;gap:10px;padding:10px 0;flex-wrap:wrap}
  .markup-group{display:flex;align-items:center;gap:8px;background:#fff2;border-radius:10px;padding:8px 14px}
  .markup-group label{font-size:12px;opacity:.8}
  .markup-input{width:60px;padding:4px 8px;border:1.5px solid #ffd700;border-radius:6px;font-size:15px;font-weight:700;text-align:center;background:transparent;color:#ffd700;outline:none}
  .markup-input::-webkit-inner-spin-button{-webkit-appearance:none}
  .pct{color:#ffd700;font-weight:700}
  .btn{padding:9px 18px;border:none;border-radius:8px;cursor:pointer;font-size:13px;font-weight:700;transition:opacity .15s,transform .1s;display:inline-flex;align-items:center;gap:6px}
  .btn:hover{opacity:.88;transform:translateY(-1px)}
  .btn-pdf{background:#ffd700;color:#1a1a4e}
  .btn-ghost{background:#fff2;color:#fff;border:1.5px solid #fff4}

  /* TABS */
  .tabs{display:flex;gap:4px;padding:16px 24px 0;border-bottom:2px solid #dee2f0}
  .tab{padding:10px 20px;border:none;background:transparent;cursor:pointer;font-size:13px;font-weight:600;color:#666;border-radius:8px 8px 0 0;border-bottom:3px solid transparent;transition:all .15s}
  .tab:hover{background:#e8eaf6;color:#333}
  .tab.active{color:#1a1a4e;border-bottom-color:#1a1a4e;background:#fff}
  .tab-count{background:#e8eaf6;color:#666;border-radius:10px;padding:1px 7px;font-size:11px;margin-left:4px;font-weight:700}
  .tab.active .tab-count{background:#1a1a4e;color:#fff}

  /* TABLE */
  .table-wrap{padding:0 24px 24px;overflow-x:auto}
  .price-table{width:100%;border-collapse:collapse;margin-top:12px;background:#fff;border-radius:12px;overflow:hidden;box-shadow:0 2px 12px #0001}
  .price-table thead tr{background:#1a1a4e;color:#fff}
  .price-table thead th{padding:11px 12px;text-align:left;font-size:11px;font-weight:700;letter-spacing:.5px;white-space:nowrap}
  .price-table tbody tr{border-bottom:1px solid #f0f0f8;transition:background .1s}
  .price-table tbody tr:hover{background:#f5f6ff}
  .price-table tbody tr:last-child{border-bottom:none}
  .price-table td{padding:9px 12px;font-size:12px;vertical-align:top}
  .art{font-weight:800;color:#1a1a4e;white-space:nowrap}
  .cross{color:#666;font-size:11px}
  .app-text{color:#444;max-width:320px;line-height:1.4}
  .price-buy{color:#888;text-align:right;white-space:nowrap}
  .price-sell{font-weight:800;color:#1a7a1a;font-size:14px;text-align:right;white-space:nowrap}
  .cat-badge{display:inline-block;padding:2px 8px;border-radius:4px;font-size:10px;font-weight:700;letter-spacing:.5px}
  .cat-oil{background:#fff3e0;color:#e65100}
  .cat-air{background:#e3f2fd;color:#1565c0}
  .cat-cab{background:#f3e5f5;color:#6a1b9a}

  /* STATS */
  .stats{display:flex;gap:12px;padding:16px 24px 0;flex-wrap:wrap}
  .stat{background:#fff;border-radius:10px;padding:10px 16px;display:flex;align-items:center;gap:10px;box-shadow:0 1px 4px #0001}
  .stat-val{font-size:22px;font-weight:900;color:#1a1a4e;line-height:1}
  .stat-label{font-size:11px;color:#888;margin-top:2px}

  /* EMPTY */
  .empty{text-align:center;padding:60px 20px;color:#aaa;font-size:15px}

  /* RESULT COUNT */
  .result-info{padding:10px 24px;font-size:12px;color:#888}

  /* PRINT / PDF table styles */
  @media print{.header,.tabs,.stats,.result-info{display:none}.table-wrap{padding:0}}
</style>
</head>
<body>

<!-- HEADER -->
<div class="header">
  <div class="logo">
    <div class="logo-box">TAKUMA</div>
    <div>
      <div style="font-weight:700;font-size:15px">Прайс-лист фильтров</div>

  <div class="header-mid">

  <div class="header-right">
    <div class="markup-group">

</div>

<!-- STATS -->
<div class="stats">

  <div class="stat"><div><div class="stat-val" style="color:#e65100" id="statOil">66</div><div class="stat-label">🛢 Масляные</div></div></div>
  <div class="stat"><div><div class="stat-val" style="color:#1565c0" id="statAir">107</div><div class="stat-label">🌬 Воздушные</div></div></div>

</div>

<!-- TABS -->
<div class="tabs">
  <button class="tab active" onclick="setTab('all',this)">Все <span class="tab-count" id="cnt-all">222</span></button>
  <button class="tab" onclick="setTab('Масляные',this)">🛢 Масляные <span class="tab-count" id="cnt-oil">66</span></button>

</div>

<div class="result-info" id="resultInfo"></div>

<!-- TABLE -->
<div class="table-wrap">

        <th>Кросс-номера</th>
        <th>Применимость</th>
      </tr>
    </thead>
    <tbody id="tableBody"></tbody>
  </table>

</div>

// ─── УМНЫЙ ПОИСК ─────────────────────────────────────────────────────────────
const TR = {'бмв':'bmw','тойота':'toyota','хендай':'hyundai','хёндай':'hyundai',
'киа':'kia','ниссан':'nissan','мерседес':'mercedes','мерс':'mercedes',
'ауди':'audi','фольксваген':'volkswagen','вольво':'volvo','шевроле':'chevrolet',
'опель':'opel','мазда':'mazda','митсубиси':'mitsubishi','субару':'subaru',
'лексус':'lexus','хонда':'honda','рено':'renault','форд':'ford','порше':'porsche',
'тесла':'tesla','геели':'geely','гили':'geely','чери':'chery','лада':'lada',
'камри':'camry','солярис':'solaris','крета':'creta','туксон':'tucson',
'спортейдж':'sportage','прадо':'prado','гольф':'golf','пассат':'passat',
'поло':'polo','тигуан':'tiguan','октавия':'octavia','суперб':'superb',
'санта':'santa','соната':'sonata','элантра':'elantra','аутлендер':'outlander',
'паджеро':'pajero','лансер':'lancer','форестер':'forester','импреза':'impreza',
'логан':'logan','дастер':'duster','веста':'vesta','атлас':'atlas',
'тигго':'tiggo','хавал':'haval','танк':'tank','рио':'rio','соренто':'sorento',
'королла':'corolla','аурис':'auris','ярис':'yaris','рав4':'rav4',
'х5':'x5','х6':'x6','х3':'x3','а3':'a3','а4':'a4','а6':'a6','а8':'a8'};

function smartNorm(q) {
  q = (q||'').toLowerCase().trim();
  for(const [r,e] of Object.entries(TR)) q = q.replace(new RegExp(r,'g'),e);
  return q;
}

let currentTab = 'all';

function sell(price) {
  const m = parseFloat(document.getElementById('markupInput').value) || 0;
  return Math.ceil(price * (1 + m / 100) / 10) * 10;
}

function catBadge(cat) {
  if(cat==='Масляные') return '<span class="cat-badge cat-oil">🛢 Масляные</span>';
  if(cat==='Воздушные') return '<span class="cat-badge cat-air">🌬 Воздушные</span>';
  return '<span class="cat-badge cat-cab">🪟 Салонные</span>';
}

function filterTable() {
  const q = document.getElementById('searchInput').value.toLowerCase().trim();
  const qn = smartNorm(q);
  const rows = DATA.filter(d => {
    if(currentTab !== 'all' && d.category !== currentTab) return false;
    if(!q) return true;
    const words = qn.split(/\s+/).filter(Boolean);
    const art = d.art.toLowerCase();
    const cross = d.cross.toLowerCase();
    const app = d.app.toLowerCase();
    const appN = smartNorm(app);
    return words.every(w => art.includes(w)||cross.includes(w)||app.includes(w)||appN.includes(w));
  });
  renderRows(rows);
}

function renderRows(rows) {
  const tbody = document.getElementById('tableBody');
  const empty = document.getElementById('emptyMsg');
  const info = document.getElementById('resultInfo');

  if(rows.length === 0) {
    tbody.innerHTML = '';
    empty.style.display = 'block';
    info.textContent = '';
    return;
  }
  empty.style.display = 'none';
  const q = document.getElementById('searchInput').value.trim();
  info.textContent = q ? `Найдено: ${rows.length} из ${DATA.filter(d => currentTab==='all' || d.category===currentTab).length}` : '';

  tbody.innerHTML = rows.map((d,i) => `
    <tr>
      <td style="color:#ccc;font-size:11px">${i+1}</td>
      <td><div class="art">${d.art}</div><div style="margin-top:4px">${catBadge(d.category)}</div></td>
      <td class="price-buy">${d.price.toLocaleString('ru')} ₸</td>
      <td class="price-sell">${sell(d.price).toLocaleString('ru')} ₸</td>
      <td><div class="cross">${d.cross || '—'}</div></td>
      <td><div class="app-text">${d.app}</div></td>
    </tr>
  `).join('');
}

function setTab(tab, el) {
  currentTab = tab;
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  el.classList.add('active');
  filterTable();
  updateCounts();
}

function updateCounts() {
  const q = document.getElementById('searchInput').value.toLowerCase().trim();
  const filtered = (cat) => DATA.filter(d => (cat==='all'||d.category===cat) && (!q || d.art.toLowerCase().includes(q)||d.cross.toLowerCase().includes(q)||d.app.toLowerCase().includes(q))).length;
  document.getElementById('cnt-all').textContent = filtered('all');
  document.getElementById('cnt-oil').textContent = filtered('Масляные');
  document.getElementById('cnt-air').textContent = filtered('Воздушные');
  document.getElementById('cnt-cab').textContent = filtered('Салонные');
}

function exportPDF() {
  const { jsPDF } = window.jspdf;
  const doc = new jsPDF({ orientation: 'landscape', unit: 'mm', format: 'a4' });
  const markup = parseFloat(document.getElementById('markupInput').value) || 0;
  const date = new Date().toLocaleDateString('ru-RU');

  // Filter current view
  const q = document.getElementById('searchInput').value.toLowerCase().trim();
  const rows = DATA.filter(d => {
    if(currentTab !== 'all' && d.category !== currentTab) return false;
    if(!q) return true;
    return d.art.toLowerCase().includes(q)||d.cross.toLowerCase().includes(q)||d.app.toLowerCase().includes(q);
  });

  const catLabel = currentTab==='all' ? 'Все фильтры' : currentTab + ' фильтры';

  // Header
  doc.setFillColor(26, 26, 78);
  doc.rect(0, 0, 297, 20, 'F');
  doc.setTextColor(255, 215, 0);
  doc.setFontSize(14);
  doc.setFont('helvetica','bold');
  doc.text('TAKUMA', 10, 13);
  doc.setTextColor(255,255,255);
  doc.setFontSize(10);
  doc.text(`Прайс-лист: ${catLabel}`, 45, 13);
  doc.setTextColor(200,200,200);
  doc.setFontSize(8);
  doc.text(`Наценка: ${markup}%  |  ${rows.length} позиций  |  ${date}`, 180, 13);

  // Table
  const tableRows = rows.map((d,i) => [
    i+1,
    d.art,
    d.price.toLocaleString('ru') + ' T',
    sell(d.price).toLocaleString('ru') + ' T',
    (d.cross||'—').substring(0,35),
    d.app.substring(0,80)
  ]);

  doc.autoTable({
    startY: 22,
    head: [['#','Артикул','Закуп','Продажа','Кросс-номера','Применимость']],
    body: tableRows,
    styles: { fontSize: 7, cellPadding: 2, overflow: 'linebreak' },
    headStyles: { fillColor: [26,26,78], textColor: [255,255,255], fontStyle: 'bold', fontSize: 7.5 },
    columnStyles: {
      0: { cellWidth: 8, halign:'center', textColor:[160,160,160] },
      1: { cellWidth: 28, fontStyle:'bold', textColor:[26,26,78] },
      2: { cellWidth: 55, textColor:[80,80,80] },
      3: { cellWidth: 120, textColor:[40,40,40] },
      4: { cellWidth: 25, halign:'right', textColor:[120,120,120] },
      5: { cellWidth: 28, halign:'right', fontStyle:'bold', textColor:[26,120,26] }
    },
    alternateRowStyles: { fillColor: [248,248,255] },
    didDrawPage: (data) => {
      const pageCount = doc.internal.getNumberOfPages();
      doc.setFontSize(7);
      doc.setTextColor(160,160,160);
      doc.text(`Страница ${data.pageNumber} из ${pageCount}`, 270, 205);
      doc.text(`TAKUMA — ${date}`, 10, 205);
    }
  });

  const fileName = `TAKUMA_Прайс_наценка${markup}%_${date.replace(/\./g,'-')}.pdf`;
  doc.save(fileName);
}

// Init
document.addEventListener('DOMContentLoaded', () => {
  filterTable();
  updateCounts();
  document.getElementById('markupInput').addEventListener('input', () => { filterTable(); updateCounts(); });
});
</script>
